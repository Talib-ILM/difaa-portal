<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Difaa-e-Deoband</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { display: block; padding: 24px 16px; }
    .dashboard { max-width: 800px; margin: 0 auto; }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 32px; flex-wrap: wrap; gap: 12px;
    }
    .top-bar h1 { font-size: 1.5rem; text-align: left; margin: 0; }
    .top-bar .user-info { color: var(--text-secondary); font-size: 0.875rem; }
    .btn-logout {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-secondary); padding: 8px 16px; border-radius: 8px;
      font-family: 'Playfair Display', serif; font-size: 0.875rem;
      cursor: pointer;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }
    .form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px; margin-bottom: 32px;
    }
    .form-card h2 { font-size: 1.25rem; margin-bottom: 20px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-row .form-group { flex: 1; min-width: 140px; }
    .form-group-full { margin-bottom: 20px; }
    textarea {
      width: 100%; padding: 12px 16px; border: 1px solid var(--border);
      border-radius: 8px; font-family: 'Playfair Display', serif;
      font-size: 1rem; background: var(--secondary); color: var(--text-primary);
      outline: none; resize: vertical; min-height: 100px;
    }
    textarea:focus { border-color: var(--primary); }
    .records-list h2 { font-size: 1.25rem; margin-bottom: 16px; }
    .record-item {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px 20px; margin-bottom: 8px;
    }
    .record-item .info { flex: 1; }
    .record-item .title { font-weight: 600; font-size: 1rem; }
    .record-item .category {
      font-size: 0.75rem; color: var(--primary);
      background: rgba(76,175,80,0.1); padding: 2px 8px;
      border-radius: 999px; display: inline-block; margin-top: 4px;
    }
    .btn-delete {
      background: var(--danger); color: #fff; border: none;
      padding: 8px 16px; border-radius: 8px; font-family: 'Playfair Display', serif;
      font-size: 0.8rem; cursor: pointer; white-space: nowrap;
    }
    .btn-delete:hover { opacity: 0.85; }
    .empty { text-align: center; color: var(--text-secondary); padding: 32px; }
    .success {
      background: #E8F5E9; color: #2E7D32; padding: 10px 14px;
      border-radius: 8px; font-size: 0.875rem; margin-bottom: 16px; display: none;
    }
    .success.show { display: block; }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="top-bar">
      <div>
        <h1>Admin Dashboard</h1>
        <span class="user-info" id="userInfo"></span>
      </div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>

    <div id="success" class="success"></div>
    <div id="error" class="error"></div>

    <div class="form-card">
      <h2>Add New Dalail</h2>
      <form id="addForm">
        <div class="form-row">
          <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="title" required>
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <input type="text" id="category" required placeholder="e.g. Fiqh, Aqeedah">
          </div>
        </div>
        <div class="form-group-full">
          <label for="content_english">Content (English)</label>
          <textarea id="content_english"></textarea>
        </div>
        <div class="form-group-full">
          <label for="content_arabic">Content (Arabic)</label>
          <textarea id="content_arabic" dir="rtl"></textarea>
        </div>
        <div class="form-group-full">
          <label for="content_urdu">Content (Urdu)</label>
          <textarea id="content_urdu" dir="rtl"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Add Record</button>
      </form>
    </div>

    <div class="records-list">
      <h2>Existing Records</h2>
      <div id="recordsList"><p class="empty">Loading...</p></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('portal_token');
    const user = JSON.parse(localStorage.getItem('portal_user') || 'null');
    if (!token || !user) { window.location.href = '/'; }
    document.getElementById('userInfo').textContent = user ? `Logged in as ${user.username}` : '';

    function headers() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    function showMsg(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.add('show');
      if (id !== 'recordsList') setTimeout(() => el.classList.remove('show'), 4000);
    }

    async function loadRecords() {
      try {
        const res = await fetch('/api/dalail', { headers: headers() });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        const list = document.getElementById('recordsList');
        if (!data.records || data.records.length === 0) {
          list.innerHTML = '<p class="empty">No records yet</p>';
          return;
        }
        list.innerHTML = data.records.map(r => `
          <div class="record-item">
            <div class="info">
              <div class="title">${escapeHtml(r.title)}</div>
              <span class="category">${escapeHtml(r.category)}</span>
            </div>
            <button class="btn-delete" onclick="deleteRecord(${r.id})">Delete</button>
          </div>
        `).join('');
      } catch {
        document.getElementById('recordsList').innerHTML = '<p class="empty">Failed to load</p>';
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('error').classList.remove('show');
      document.getElementById('success').classList.remove('show');
      const body = {
        title: document.getElementById('title').value.trim(),
        category: document.getElementById('category').value.trim(),
        content_english: document.getElementById('content_english').value.trim(),
        content_arabic: document.getElementById('content_arabic').value.trim(),
        content_urdu: document.getElementById('content_urdu').value.trim(),
      };
      try {
        const res = await fetch('/api/dalail', {
          method: 'POST', headers: headers(), body: JSON.stringify(body)
        });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        if (!res.ok) { showMsg('error', data.error || 'Failed to add'); return; }
        showMsg('success', 'Record added!');
        e.target.reset();
        loadRecords();
      } catch {
        showMsg('error', 'Network error');
      }
    });

    async function deleteRecord(id) {
      if (!confirm('Delete this record?')) return;
      try {
        const res = await fetch(`/api/dalail?id=${id}`, {
          method: 'DELETE', headers: headers()
        });
        if (res.status === 401) { logout(); return; }
        loadRecords();
      } catch {}
    }

    function logout() {
      localStorage.removeItem('portal_token');
      localStorage.removeItem('portal_user');
      window.location.href = '/';
    }

    loadRecords();
  </script>
</body>
</html>
